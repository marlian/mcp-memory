name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - name: Smoke test
        run: npm test

  sensitive-data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive data and private paths
        run: |
          echo "Scanning for private paths, credentials, and PII patterns..."

          FAILED=0

          check() {
            local pattern="$1"
            local matches
            matches=$(grep -rn -E --include='*.js' --include='*.json' --include='*.md' --include='*.ts' --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.github -- "$pattern" . 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Sensitive pattern found: $pattern"
              echo "$matches"
              FAILED=1
            fi
          }

          # Private paths
          check '/Users/[a-zA-Z]'
          check '/home/[a-zA-Z]'
          check 'C:\\Users\\'

          # Credential patterns
          check 'sk-[a-zA-Z0-9]{20,}'
          check 'ghp_[a-zA-Z0-9]{36}'
          check 'gho_[a-zA-Z0-9]{36}'
          check 'AKIA[0-9A-Z]{16}'
          check 'password\s*[:=]\s*"[^"]+'

          # Connection strings with embedded credentials
          check 'postgres://[^:]+:[^@]+@'
          check 'mysql://[^:]+:[^@]+@'
          check 'mongodb(\+srv)?://[^:]+:[^@]+@'

          # Private keys
          check 'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY'

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::Sensitive data detected. Review the matches above and remove private paths, credentials, or PII before merging."
            exit 1
          fi

          echo "No sensitive data found."
