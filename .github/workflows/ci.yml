name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - name: Smoke test
        run: npm test

  sensitive-data-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for sensitive data and private paths
        run: |
          echo "Scanning for private paths, credentials, and PII patterns..."

          # Write patterns to a file so grep never misinterprets them as flags.
          # This file IS the scanner definition — exclude it from its own scan.
          PFILE=$(mktemp)
          cat > "$PFILE" <<'PATTERNS'
          /Users/[a-zA-Z]
          /home/[a-zA-Z]
          C:\\Users\\
          sk-[a-zA-Z0-9]{20,}
          ghp_[a-zA-Z0-9]{36}
          gho_[a-zA-Z0-9]{36}
          AKIA[0-9A-Z]{16}
          password\s*[:=]\s*["'][^"']+
          postgres://[^:]+:[^@]+@
          mysql://[^:]+:[^@]+@
          mongodb(\+srv)?://[^:]+:[^@]+@
          -----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----
          PATTERNS

          FAILED=0
          while IFS= read -r pattern; do
            # Skip blank lines and whitespace-only
            trimmed=$(echo "$pattern" | xargs)
            [ -z "$trimmed" ] && continue

            MATCHES=$(grep -rn -E -- "$trimmed" . \
              --include='*.js' --include='*.json' --include='*.md' \
              --include='*.ts' --include='*.env*' \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=.github \
              || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Sensitive pattern found: $trimmed"
              echo "$MATCHES"
              FAILED=1
            fi
          done < "$PFILE"

          rm -f "$PFILE"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::Sensitive data detected. Review the matches above and remove private paths, credentials, or PII before merging."
            exit 1
          fi

          echo "No sensitive data found."
